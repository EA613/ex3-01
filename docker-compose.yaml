services:
  watchtower:
    image: nickfedor/watchtower
    environment:
      -  WATCHTOWER_POLL_INTERVAL=60 # Poll every 60 seconds
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    container_name: watchtower
    command: ex3_01-container-express-app

  ex3_01-service-express-app:
    image: moocydocker613/express-app
    ports:
      - 8080:8080
    container_name: ex3_01-container-express-app